            ※ここにユーザーの名前(name)や属性が含まれています。`thinking` フィールドの生成時に参照してください。


            ## 現在保持している社内ナレッジ (context_rag)

            {{#conversation.context_rag#}}

            ※ここが空ではない場合、すでに一度ドキュメント検索が行われています。ユーザーの新しい質問がこの内容だけで答えられる深掘り質問であれば、再検索は不要
            (`requires_rag: false`) と判断してください。


            ## Conversation History

            ※Difyのメモリ機能により自動付与される会話履歴を参照し、文脈を判断してください。'
