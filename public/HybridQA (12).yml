            n2. 10万円以上50万円未満：部長承認\\n3. 50万円以上100万円未満：本部長決裁\\n4. 100万円以上：役員会決裁\\n\\\
            n第5条（SaaS利用の特例）\\n金額に関わらず、クラウドサービス（SaaS）の新規契約においては、情報システム部による「セキュリティチェックシート」の提出と承認（決裁者：情シス部長）が必須となる。これは無料プランの業務利用も含む。\\\
            n\\n第8条（緊急決裁）\\n災害時やシステム障害時など、緊急を要する場合は事後承認を認めるが、発生から3営業日以内に正規のフローで申請を行うこと。\"\
            \n  },\n  {\n    \"source_name\": \"ITセキュリティガイドライン_v3.2.docx\",\n    \"\
            content\": \"3-1. パスワードポリシー\\n社内システムおよび連携する外部クラウドサービス（SaaS）のパスワードは以下の要件を満たす必要がある。\\\
            n- 文字数：12文字以上\\n- 構成：大文字、小文字、数字、記号の4種類すべてを混在させること\\n- 変更頻度：定期的変更は求めないが、漏洩が疑われる場合は直ちに変更すること\\\
            n- 禁止事項：氏名、社員番号、誕生日など推測容易な文字列の使用\\n\\n4-2. 生成AIの利用規定\\n- 当社が契約している「ChatGPT\
            \ Enterprise」および本プロジェクトで開発中の「社内AIチャットボット」以外の生成AIサービスへの業務データの入力は原則禁止とする。\\\
            n- 翻訳DeepL（無料版）への機密情報入力は厳禁。必ずPro版アカウントを使用すること。\\n\\n5-1. デバイス管理\\n- 私物PC、私物スマートフォンの業務ネットワーク接続（BYOD）は、事前に申請し「MDM（モバイルデバイス管理ツール）」を導入した端末に限り許可する。\\\
            n- USBメモリ等の外部記憶媒体の使用は原則禁止とする。\"\n  },\n  {\n    \"source_name\": \"旅費・経費精算規程_2024.pdf\"\
            ,\n    \"content\": \"第2章 交通費\\n1. 通勤交通費：最も経済的な経路（最安経路）を原則とする。ただし、所要時間が最安経路の0.8倍以下となる場合は、最速経路を認める場合がある。\\\
            n2. タクシー利用：原則禁止。ただし、終電を逃した場合（業務起因に限る）、または公共交通機関での移動が困難な重量物を運搬する場合に限り、部長承認の上で許可する。\\\
            n3. 新幹線・特急：片道100km以上の移動において利用可。指定席利用可。グリーン車は役員のみ可。\\n\\n第4章 接待交際費\\n1.\
            \ 会食基準：1人あたり5,000円（税込）までは会議費として処理可。\\n2. 5,000円を超える場合：事前申請必須（課長承認）。\\\
            n3. 1人あたり10,000円を超える場合：事前申請必須（部長承認）。二次会費用の会社負担は原則認めない。\\n\\n第6章 精算期限\\\
            n経費発生月の翌月3営業日までに「Concur」にて申請を完了すること。期限を過ぎた場合、理由書の提出が必要となる。\"\n  },\n \
            \ {\n    \"source_name\": \"テレワーク勤務規定_v2.1.pdf\",\n    \"content\": \"\
            1. 対象者\\n試用期間（入社3ヶ月）を終了し、業務に支障がないと所属長が認めた正社員および契約社員。\\n\\n2. 実施頻度\\n原則として週3回（月12回）までとする。ただし、育児・介護事由、または感染症拡大防止等の会社指示がある場合はこの上限を解除する。\\\
            n\\n3. 就業場所\\n自宅、実家、または会社が契約しているシェアオフィス（WeWork等）。カフェや公共施設など、セキュリティが担保できない場所（フリーWi-Fi環境下など）での業務は禁止する。\\\
            n\\n4. テレワーク手当\\n実施1日につき250円を支給する。これには光熱費・通信費の補助が含まれる。\\n\\n5. 勤怠管理\\\
            n始業時および終業時に、Slackの「#勤怠連絡」チャンネルにて報告を行うこと。中抜け（通院等）がある場合も同様とする。\"\n  },\n\
            \  {\n    \"source_name\": \"就業規則_第4章_休暇.pdf\",\n    \"content\": \"第12条（年次有給休暇）\\\
            n入社日から6ヶ月継続勤務し、全労働日の8割以上出勤した社員に対し、10日付与する。以降、勤続年数に応じて最大20日まで付与する。有給休暇の取得単位は「1日」「半日」「1時間」とする。\\\
            n\\n第15条（夏季休暇）\\n7月1日から9月30日までの期間において、任意の3日間を特別休暇（有給）として取得できる。業務の都合を考慮し、チーム内で調整の上取得すること。\\\
            n\\n第18条（慶弔休暇）\\n以下の事由が発生した際、申請により特別休暇を付与する。\\n1. 本人が結婚するとき：5日\\n2. 配偶者が出産するとき：2日\\\
            n3. 配偶者、子、父母が死亡したとき：5日\\n4. 兄弟姉妹、祖父母、配偶者の父母が死亡したとき：3日\"\n  }\n]"
