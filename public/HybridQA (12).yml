            \  （例: ⭕️「はい、『〇〇申請』の手順を教えて」 ⭕️「『〇〇ガイドライン』の該当箇所を詳しく」）\n⚠️【重要】ボタンのラベル(label)には「〇〇.pdfの手法」といったファイル名を含めず、必ず具体的な手法名やテーマ名を含めてください。\n\
            - **icon**: Lucide Reactのアイコン名。（例: `file-text`, `folder-search`, `arrow-right`）\n\
            - **payload**: `{\"text\": \"具体的な質問や指示文\"}`"
