              \n【指定されたストア内のファイル一覧】\n{{#1771573783623.text#}} （※実際のファイル一覧出力変数を指定してください）\n\
              \n【過去の検索結果 (Previous Knowledge)】\n{{#conversation.requires_rag#}}\n\n\
              上記の「ユーザーの質問」「AIの推論ログ」「指定されたストア内のファイル一覧」および「過去の検索結果」を踏まえ、このストア内のファイルがどのように役立つかを判断するため、以下の2つの観点で分析・出力してください。\n\
              \n⚠️【重要: 差分抽出の徹底】\n「過去の検索結果 (Previous Knowledge)」に既に記載されている内容（同じ事実や定義など）は、今回の抽出結果から完全に除外してください。過去の知識にはなく、今回の回答で「新たに必要となる情報（差分）」だけを狙って抽出・要約してください。\n\
              \n1. **【質問との関連性（簡易検索・差分抽出）】**\n   推論ログで指摘された意図やキーワードに最も関連し、かつ「過去の検索結果」にはまだ存在しない新しい情報を持つファイルを探してください。\n\
              \   ※比較や横断的な調査が求められている場合は、関連する「複数」のファイルをピックアップし、それぞれの「ファイル名」と「関連する記述の抜粋」を挙げてください。もし質問が抽象的な場合は、推論ログを参考に中心となりそうなファイルを推測してください。\n\
              \n2. **【ファイル構成の要約】**\n   コンテキスト全体を把握するため、全てのファイルをリストアップし、それぞれの内容を1文で要約してください。（※ここでも既に知っている情報の反復は避け、今回の文脈においてどう役立つかを中心に要約してください）\n\
              \n---\n【出力形式】\n### \U0001F3AF 質問との関連（ヒットした情報）\n※関連するファイルが複数ある場合は、以下のようにファイルごとに列挙してください。（新規情報がない場合は「新規情報なし」と記載）\n\
              \n- **関連ファイル1**: [ファイル名]（資料タイトル・大見出し）\n  - **関連キーワード/記述**: [抜粋や要約]\n\
              \  - **推奨アクション**: [「〇〇との比較に用いる」など]\n- **関連ファイル2**: [ファイル名]（資料タイトル・大見出し）\n\
              \  - **関連キーワード/記述**: [抜粋や要約]\n  - **推奨アクション**: [「〇〇との比較に用いる」など]\n\n\
              ### \U0001F4C2 ストア内ファイル一覧（全体像）\n- ファイル1: [ファイル名]\n  タイトル: [資料から抽出されるタイトル・テーマ]\n\
